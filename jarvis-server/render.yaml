# Render Blueprint — auto-configures the web service when you connect this repo.
# Render → New → Blueprint → select this repo → it reads this file.
services:
  - type: web
    name: quantum-mind-backend
    runtime: node
    rootDir: jarvis-server
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_SECRET
        sync: false
      - key: BINANCE_TESTNET
        value: "true"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
